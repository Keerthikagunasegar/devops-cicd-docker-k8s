apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-webapp
  template:
    metadata:
      labels:
        app: cicd-webapp
    spec:
      containers:
      - name: cicd-webapp
        image: keerthikagunasegar/cicd-webapp:v1
        ports:
        - containerPort: 80