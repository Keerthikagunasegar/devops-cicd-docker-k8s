<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>DevOps CI/CD Pipeline Demo</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f8;
    text-align:center;
    margin-top:100px;
}

.container{
    background:white;
    width:500px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

h1{
    color:#2c3e50;
}

.status{
    color:green;
    font-weight:bold;
    margin-top:10px;
}

.pipeline{
    margin-top:20px;
}

.pipeline span{
    background:#e8f0fe;
    padding:6px 10px;
    margin:4px;
    border-radius:5px;
    display:inline-block;
}

.footer{
    margin-top:20px;
    font-size:14px;
    color:#555;
}
</style>

</head>

<body>

<div class="container">

<h1>🚀 DevOps CI/CD Pipeline</h1>

<p class="status">Application Successfully Deployed</p>

<div class="pipeline">
<span>GitHub</span> →
<span>Jenkins</span> →
<span>Docker</span> →
<span>Kubernetes</span>
</div>

<div class="footer">
<p>Project: Automated CI/CD Pipeline</p>
<p>Engineer: Keerthika</p>
</div>

</div>

</body>
</html>
